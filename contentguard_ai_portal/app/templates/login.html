{% extends "base.html" %}

{% block title %}Login - ContentGuard AI{% endblock %}

{% block content %}

<div class="glass-container" style="max-width: 400px;">
    <div style="text-align: center; margin-bottom: 2rem;">
        <img src="{{ url_for('static', path='images/logo.png') }}" alt="ContentGuard AI" height="80">
        <h1>Welcome Back</h1>
        <p class="text-secondary">Login to access your dashboard</p>
    </div>

    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/auth/login" data-validate>
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required
                   placeholder="Enter your username">
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required
                   placeholder="Enter your password">
        </div>

        <button type="submit" class="btn" style="width: 100%;">Login</button>
    </form>

    <div style="text-align: center; margin-top: 1.5rem;">
        <p><a href="/auth/forgot">Forgot Password?</a></p>
        <p>New user? <a href="/auth/register">Register here</a></p>
    </div>
</div>

{% endblock %}
